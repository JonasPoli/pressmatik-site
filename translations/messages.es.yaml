  spec_die_cushion_area: "Área Activa del Cojín de Matriz"
  overview_heading: "Aspectos Tecnológicos Destacados e Ingeniería de Precisión"
  overview_text: "La serie de prensas mecánicas de garganta profunda PMC-ST está diseñada para cumplir con los requisitos más exigentes de conformado, doblado y punzonado de chapas metálicas, optimizada específicamente para la perforación de mallas. Con principios de diseño avanzados y componentes certificados, la serie PMC-ST combina alta productividad, bajo desgaste y confiabilidad absoluta."
  key_features_heading: "Ventajas Clave del Diseño"
  feature_detail_1_title: "Estructura Monobloque Pesada"
  feature_detail_1_desc: "Placas de acero de alta resistencia soldadas en un chasis monobloque rígido con alivio térmico de tensión para minimizar la flexión. Garantiza una alta precisión de conformado, menos desgaste del utillaje y larga vida operativa."
  feature_detail_2_title: "Cigüeñal Forjado en Aleación 42CrMo"
  feature_detail_2_desc: "Cigüeñal forjado en aleación especial 42CrMo de alta resistencia, mecanizado con la máxima precisión. Ofrece una resistencia mecánica 1.3 veces superior al acero #45 común, soportando altas cargas de torsión."
  feature_detail_3_title: "Guía de Deslizamiento de 6 Puntos"
  feature_detail_3_desc: "Sistema de guías lineales de 6 puntos con proceso exclusivo de templado y rectificado (Quenching & Grinding). Reduce drásticamente la fricción y el desgaste lateral, operando bajo las estrictas normas de precisión JIS Clase 1."
  feature_detail_4_title: "Automatización con Base Siemens"
  feature_detail_4_desc: "Panel HMI de pantalla táctil y PLC basados en tecnología de automatización industrial Siemens. Facilita el diagnóstico de fallas en pantalla y la integración turnkey con líneas de alimentación automática."
  subproducts_tag: "Modelos y Variaciones"
  subproducts_title: "Subproductos de la Serie PMC"
  subproducts_desc: "La serie PMC dispone de diversas configuraciones estructurales y de dimensiones personalizadas para diferentes procesos industriales de conformado, rebabado y montaje."
  models_tag: "Modelos"
  models_title: "Modelos Disponibles"
  models_desc: "Vea todas las variaciones constructivas y modelos de prensas desarrollados bajo esta línea de productos."
  subproducts:
    st:
      name: "PMC-ST Stander"
      desc: "Modelo estándar ideal para operaciones generales de estampado, doblado y corte, montado sobre una zapata rígida."
    bc:
      name: "PMC-BC Bancada"
      desc: "Estructura compacta diseñada para montaje en bancos de trabajo, ideal para operaciones de precisión en piezas pequeñas."
    gt:
      name: "PMC-GT Mesa Giratoria"
      desc: "Equipada con mesa de indexación giratoria para procesos automatizados con alta velocidad de carga y descarga de piezas."
    tr:
      name: "PMC-TR Rebabado y Calibración"
      desc: "Diseñada específicamente para la eliminación de rebabas en piezas de fundición y la calibración fina de componentes metálicos."
    mt:
      name: "PMC-MT Mesa Móvil"
      desc: "Cuenta con mesa de trabajo móvil/extraíble para facilitar el setup y la carga de troqueles y moldes pesados de forma segura."
    al:
      name: "PMC-AL Alineación de Ejes"
      desc: "Modelo especializado con mesa extendida y sistema de control de alta precisión para el enderezado y alineación de barras y ejes."
    hz:
      name: "PMC-HZ Horizontal"
      desc: "Opera en el plano horizontal, ideal para procesos de montaje por interferencia, casquillos, ajuste y extrusión."
    es:
      name: "PMC-ES Especial"
      desc: "Proyectos 100% a medida con dimensiones, recorridos y automatizaciones personalizadas según las necesidades del cliente."

