product_detail:
  tag: "Equipo Pesado"
  breadcrumbs: "Productos > Prensas Hidráulicas > Tipo C > Modelo PMC-ST"
  title: "Prensa de Garganta Profunda de Manivela Única con Estructura en C"
  subtitle: "Serie PMC-ST - Capacidad de 25 a 160 Toneladas"
  short_desc: "La serie de prensas de garganta profunda PMC-ST está diseñada especialmente para aplicaciones de punzonado de mallas metálicas. La distancia desde el centro del martillo hasta la estructura (profundidad de garganta) se puede personalizar completamente según los requisitos de la fábrica. Se puede vincular a alimentadores servo para automatización y alta productividad."
  specs_title: "Parámetros Técnicos"
  features_title: "Características Técnicas"
  config_title: "Configuración Estándar y Opcional"
  videos_title: "Videos en Operación"
  quote_product: "Solicitar Presupuesto para este Modelo"
