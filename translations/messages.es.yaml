  bolster_size: "Mesa de Trabajo"
  throat_depth: "Profundidad de Garganta"
  footnote: "* Nota: Los valores entre paréntesis indican las especificaciones para carrera reducida (alta velocidad). La profundidad de la garganta (distancia desde el centro del martillo hasta la estructura) es totalmente personalizable según los requisitos del cliente."
  std_items: "Artículos de Serie"
  opt_items: "Artículos Opcionales"
  features_list:
    - "Estructura robusta de acero de una sola pieza, que minimiza la deflexión y asegura alta precisión."
    - "Freno y embrague neumático seco OMPI para mayor vida útil y par constante."
    - "Guía de martillo de 6 puntos con proceso de templado y rectificado, reduciendo el desgaste y aumentando la vida útil."
    - "Cigüeñal forjado en aleación 42CrMo con resistencia 1.3 veces superior al acero común y mayor durabilidad."
    - "Buje de cobre fabricado en bronce de fósforo y estaño ZQSn10-1, con una resistencia 1.5 veces mayor que el latón BC6 común."
    - "Dispositivo de protección contra sobrecarga hidráulica altamente sensible para proteger la prensa y el utillaje."
    - "Construida bajo las normas de precisión JIS Clase 1."
    - "Cojín de matriz opcional (Die Cushion) para mayor flexibilidad de formado."
