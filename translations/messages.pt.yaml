product_detail:
  tag: "Equipamento Pesado"
  breadcrumbs: "Produtos > Prensas Hidráulicas > Tipo C > Modelo PMC-ST"
  title: "Prensa de Garganta Profunda de Manivela Única com Estrutura em C"
  subtitle: "Série PMC-ST - Capacidade de 25 a 160 Toneladas"
  short_desc: "A série PMC-ST de prensas de garganta profunda foi projetada especialmente para aplicações de estampagem de telas e malhas. A distância do centro do martelo até a estrutura (profundidade da garganta) pode ser totalmente personalizada conforme as necessidades da fábrica. Pode ser integrada a alimentadores servo-motores de chapa para automatização e aumento de produtividade."
