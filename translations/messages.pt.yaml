  opt_items: "Itens Opcionais (Optional)"
  features_list:
    - "Estrutura robusta em monobloco de aço para minimizar deflexões e garantir alta precisão."
    - "Freio e embreagem pneumática seca OMPI para maior vida útil e torque constante."
    - "Guia de martelo de 6 pontos com processo de têmpera e retificação, reduzindo o desgaste."
    - "Eixo virabrequim forjado em liga 42CrMo com resistência 1.3 vezes superior ao aço comum e maior vida útil."
    - "Bucha de bronze fosforoso de estanho ZQSn10-1 com resistência 1.5 vezes maior que o latão comum BC6."
    - "Dispositivo de proteção contra sobrecarga hidráulica altamente sensível para proteger a prensa e as ferramentas."
    - "Construída sob a rigorosa norma de precisão JIS Classe 1."
    - "Almofada de estampagem opcional (Die Cushion) para maior flexibilidade de processos."
