  spec_die_cushion_area: "Área Útil da Almofada"
  overview_heading: "Destaques Tecnológicos & Engenharia de Precisão"
  overview_text: "A série PMC-ST de prensas de garganta profunda foi projetada especialmente para atender às mais rigorosas demandas de estampagem, dobra e conformação de chapas, com especial destaque para a perfuração de telas e malhas metálicas (screen mesh). Com engenharia avançada e componentes certificados, a linha PMC-ST combina alto desempenho, baixo desgaste e confiabilidade incomparável no chão de fábrica."
  key_features_heading: "Principais Diferenciais do Projeto"
  feature_detail_1_title: "Estrutura Integrada Monobloco"
  feature_detail_1_desc: "Chapas de aço estrutural de alta resistência soldadas em monobloco pesado, com alívio térmico de tensões internas. Esse projeto minimiza a deformação estrutural (deflexão lateral) sob carga máxima de estampagem, garantindo a precisão das peças e a integridade dos estampos."
  feature_detail_2_title: "Eixo Virabrequim em Liga 42CrMo"
  feature_detail_2_desc: "Virabrequim forjado a partir de liga nobre de cromo-molibdênio 42CrMo, usinado com precisão absoluta. Oferece resistência mecânica 1.3 vezes superior ao aço convencional #45, assegurando torque constante e alta resistência à fadiga."
  feature_detail_3_title: "Guiamento Prismático de 6 Pontos"
  feature_detail_3_desc: "O martelo conta com sistema de guias prismáticas lineares de 6 pontos com processo exclusivo de têmpera e retificação de precisão (Quenching & Grinding). Reduz drasticamente o atrito e o desgaste do conjunto, operando sob o rigoroso padrão de precisão JIS Classe 1."
  feature_detail_4_title: "Controle & Integração Avançados"
  feature_detail_4_desc: "Painel eletrônico touch screen baseado na plataforma Siemens de automação industrial. Facilita o controle de ciclos de trabalho, sincronização automática com alimentadores e desbobinadores (linhas turnkey) e diagnósticos preventivos integrados na tela."
  subproducts_tag: "Modelos e Variações"
  subproducts_title: "Subprodutos da Série PMC"
  subproducts_desc: "A série PMC possui diversas configurações estruturais e dimensionais customizadas para diferentes processos industriais de conformação, rebarbação e montagem."
  subproducts:
    st:
      name: "PMC-ST Stander"
      desc: "Modelo padrão ideal para operações gerais de estampagem, dobra e corte, montado sobre sapata rígida."
    bc:
      name: "PMC-BC Bancada"
      desc: "Estrutura compacta para montagem sobre bancadas de trabalho, focada em operações de precisão em peças menores."
    gt:
      name: "PMC-GT Mesa Giratória"
      desc: "Equipada com mesa indexadora giratória para processos automatizados de alta velocidade de carga e descarga de peças."
    tr:
      name: "PMC-TR Rebarbação e Calibração"
      desc: "Projetada especificamente para a rebarbação de peças fundidas e calibração fina de componentes metálicos."
    mt:
      name: "PMC-MT Mesa Móvel"
      desc: "Possui mesa de trabalho móvel/extraível para facilitar o setup e a carga de estampos e moldes pesados de forma segura."
    al:
      name: "PMC-AL Alinhamento de Eixos"
      desc: "Modelo especializado com mesa estendida e sistema de controle de precisão para endireitamento e alinhamento de barras e eixos."
    hz:
      name: "PMC-HZ Horizontal"
      desc: "Prensa que opera no plano horizontal, ideal para processos de montagem por interferência, buchas e extrusão."
    es:
      name: "PMC-ES Especial"
      desc: "Projetos 100% sob medida com dimensões, cursos e automações personalizadas de acordo com as necessidades do cliente."

