  overview_heading: "Technological Highlights & Precision Engineering"
  overview_text: "The PMC-ST deep throat mechanical press series is engineered to meet the most demanding requirements of sheet metal forming, bending, and punching, specifically optimized for screen mesh perforation. Incorporating advanced design principles and high-grade components, the PMC-ST combines high productivity, low wear, and absolute reliability on the production floor."
  key_features_heading: "Key Design Advantages"
  feature_detail_1_title: "Heavy One-Piece Steel Frame"
  feature_detail_1_desc: "High-tensile steel plates welded into a robust monobloc frame and stress-relieved to minimize deflection. This construction secures high accuracy, minimizes tool wear, and protects the structural integrity under full capacity loads."
  feature_detail_2_title: "Forged 42CrMo Crankshaft"
  feature_detail_2_desc: "Crankshaft forged from high-strength 42CrMo chrome-moly alloy material, precision-machined for smooth power transmission. Offers 1.3 times the strength of standard #45 carbon steel, securing exceptional fatigue resistance."
  feature_detail_3_title: "6-Point Slide Guiding System"
  feature_detail_3_desc: "Uses a 6-point linear slide-guiding system finished with a proprietary Quenching & Grinding process. This ensures maximum alignment, minimal friction, low wear, and meets JIS Class 1 high-precision standards."
  feature_detail_4_title: "Siemens Automation Platform"
  feature_detail_4_desc: "Standardized Siemens-based PLC control with a user-friendly color touchscreen HMI. Provides expandable capabilities for seamless integration with servo feeders, coil lines, and other peripheral automation systems."
  subproducts_tag: "Models & Variations"
  subproducts_title: "PMC Series Subproducts"
  subproducts_desc: "The PMC series is available in several structural and dimensional configurations customized for different industrial processes of metal forming, deflashing, and assembly."
  subproducts:
    st:
      name: "PMC-ST Stander"
      desc: "Standard model ideal for general stamping, bending and cutting operations, mounted on a heavy rigid bolster base."
    bc:
      name: "PMC-BC Benchtop"
      desc: "Compact structure designed for mounting on workbenches, focusing on high precision operations for smaller parts."
    gt:
      name: "PMC-GT Rotary Table"
      desc: "Equipped with a rotary indexing table for automated processes requiring fast loading and unloading speeds."
    tr:
      name: "PMC-TR Deflashing & Calibration"
      desc: "Specifically engineered for deflashing cast parts and precise calibration of metal workpieces."
    mt:
      name: "PMC-MT Movable Table"
      desc: "Features a movable or roll-out bolster table to facilitate setup and heavy mold/die loading safely and easily."
    al:
      name: "PMC-AL Axis Alignment"
      desc: "Specialized model with an extended bed and high-precision control system for straightening shafts and alignment."
    hz:
      name: "PMC-HZ Horizontal"
      desc: "Operates in the horizontal plane, ideal for interference press fitting, assembly, bushing and extrusion."
    es:
      name: "PMC-ES Special Custom"
      desc: "100% custom-tailored projects with dimensions, stroke lengths, and automation customized to customer needs."

