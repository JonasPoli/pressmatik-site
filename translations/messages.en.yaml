product_detail:
  tag: "Heavy Equipment"
  breadcrumbs: "Products > Hydraulic Presses > C-Frame > Model PMC-ST"
  title: "C-Frame Single Crank Deep Throat Press"
  subtitle: "PMC-ST Series - Capacity 25 to 160 Tons"
  short_desc: "The PMC-ST deep throat series presses are specially designed for sheet metal and screen mesh punching applications. The throat depth (distance from slide center to frame) can be fully customized based on factory requirements. They can be linked to servo roll feeders to realize automatic feeding and stamping, improving production efficiency."
